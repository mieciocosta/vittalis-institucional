<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B8C0"/>
      <stop offset="100%" stop-color="#207898"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.15)"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#overlay)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="180" fill="rgba(255,255,255,0.05)" filter="url(#blur)"/>
  <circle cx="1000" cy="650" r="220" fill="rgba(255,255,255,0.04)" filter="url(#blur)"/>
  <circle cx="900" cy="200" r="100" fill="rgba(255,255,255,0.03)"/>
  <!-- Diamond pattern -->
  <g transform="translate(600,320)" opacity="0.08">
    <polygon points="0,-120 100,-60 80,60 -80,60 -100,-60" fill="none" stroke="white" stroke-width="2"/>
    <line x1="0" y1="-120" x2="0" y2="60" stroke="white" stroke-width="1"/>
    <line x1="-100" y1="-60" x2="80" y2="60" stroke="white" stroke-width="1"/>
    <line x1="100" y1="-60" x2="-80" y2="60" stroke="white" stroke-width="1"/>
  </g>
  <!-- Icon -->
  <text x="600" y="340" text-anchor="middle" font-size="72" opacity="0.6">💉</text>
  <!-- Label -->
  <text x="600" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="600" fill="white" opacity="0.95">Vacinação com Conforto</text>
  <text x="600" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="white" opacity="0.7">Ambiente acolhedor para toda a família</text>
  <!-- Instruction -->
  <text x="600" y="700" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="white" opacity="0.35">Substitua por foto profissional • 1200×800px</text>
</svg>